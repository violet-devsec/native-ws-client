<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebSocket Protocol Client</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      max-width: 1100px;
      line-height: 1.45;
    }
    h1 {
      margin: 0 0 12px;
    }
    .hint {
      color: #555;
      margin: 0 0 16px;
    }
    .status {
      padding: 10px 12px;
      border: 1px solid #ddd;
      background: #f6f6f6;
      margin-bottom: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 0.92rem;
      color: #333;
    }
    input, button, textarea {
      font: inherit;
    }
    input[type="text"] {
      padding: 10px;
      width: 100%;
      box-sizing: border-box;
    }
    textarea {
      width: 100%;
      height: 260px;
      padding: 10px;
      box-sizing: border-box;
      resize: vertical;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    button {
      padding: 10px 14px;
      cursor: pointer;
    }
    .small {
      font-size: 0.9rem;
      color: #666;
    }
    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>WebSocket Protocol Client</h1>
  <p class="hint">
    Connects to a local WebSocket server, sends <code>auth</code> first, then waits for server <code>sign</code> and <code>ok</code>,
    while logging keepalive packets and all frames to the console.
  </p>

  <div class="status" id="status">Disconnected</div>

  <div class="grid">
    <div class="field">
      <label for="port">WebSocket Port</label>
      <input id="port" type="text" value="" />
    </div>
    <div class="field">
      <label for="commit">Commit</label>
      <input id="commit" type="text" value="d2e2138fe4eecab29cb2cd7e02ddae37bed2d5fb" />
    </div>
    <div class="field">
      <label for="auth">Auth</label>
      <input id="auth" type="text" value="" />
    </div>
    <div class="field">
      <label for="data">Data</label>
      <input id="data" type="text" value="16c474b0-7b2c-4a87-9d97-9b130d459cfc" />
    </div>
    <div class="field">
      <label for="remoteAuthority">Remote Authority</label>
      <input id="remoteAuthority" type="text" value="wsl+ubuntu-26.04" />
    </div>
    <div class="field">
      <label for="clientId">Client ID</label>
      <input id="clientId" type="text" value="renderer" />
    </div>
    <div class="field">
      <label for="connectionId">Connection ID</label>
      <input id="connectionId" type="text" value="112a5c9b-dcfa-403c-9baa-f998fa009451" />
    </div>
  </div>

  <div class="row">
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn" disabled>Disconnect</button>
    <button id="clearBtn">Clear Log</button>
  </div>

  <div class="small">
    Keepalive frame recognized as: <code>09 00 00 00 00 00 00 00 00 00 00 00 00 00</code>
  </div>

  <textarea id="log" readonly></textarea>

  <script>
    els.connectBtn.addEventListener("click", getFormData);
    els.disconnectBtn.addEventListener("click", disconnect);
    els.clearBtn.addEventListener("click", () => {
      els.log.value = "";
      console.clear();
      log("Log cleared.");
    });

    const els = {
      wsUrl: document.getElementById("wsUrl"),
      auth: document.getElementById("auth"),
      data: document.getElementById("data"),
      commit: document.getElementById("commit"),
      remoteAuthority: document.getElementById("remoteAuthority"),
      clientId: document.getElementById("clientId"),
      connectionId: document.getElementById("connectionId"),
      status: document.getElementById("status"),
      log: document.getElementById("log"),
      connectBtn: document.getElementById("connectBtn"),
      disconnectBtn: document.getElementById("disconnectBtn"),
      clearBtn: document.getElementById("clearBtn")
    };

    function getFormData() {
        var p = document.getElementById('port').value;
        const s = connectWS(p);
        console.log(JSON.stringify(s));
    }

    function connectWS(port) {
        let url = `ws://localhost:${port}`;
        
        // Open the socket.
        var socket;
        socket = new WebSocket(url);
        socket.binaryType = "arraybuffer";

        // ----- Start of Socket Events -----

        // This is executed when the websocket is opened.
        socket.onopen = function(event) {
            // Send auth when the websocket is opened.
            // auth packet
            const auth = "040000000000000000000000000200000000000000000000002D7B2274797065223A2261757468222C2261757468223A223030303030303030303030303030303030303030227D";
            const authBytes = hexStringToArrayBuffer(auth);
            const data = els.data;
            let packetData = `{"type":"auth","auth":"${authBytes}","data":"${data}"}`;
            sendMessage(socket, authBytes);
        };

        // Display incoming websocket messages.
        socket.onmessage = async function(event) {
            let incomingMessage = event.data;
            
            // Print what we got.
            let packet = parsePacket(incomingMessage);
            showMessage(`${packet.type}: ${packet.data}`);
            // showMessage(`Received: ${packet.type}`);

            // Check if the message contains `"sign"`.
            if (packet.data.includes('"sign"')) {
                // Parse the data as json and extract sign.
                const parsed = JSON.parse(packet.data);
                showMessage(`Got a signing request: ${parsed.data}`);
                //showMessage('Got a signing request');
                showMessage('Sending a request to /sign');

                // Now we need to make a request to /sign.
                const signed = doSigning(packet.data); //await (await postJSON('/sign', packet.data)).arrayBuffer();

                let sg = parsePacket(signed);
                showMessage(`${sg.data}`);

                // Send it as-is to the local WebSocket server.
                sendMessage(socket, signed);
            }

            // {"debugPort":55000}
            // Check if the message contains 'debugPort'.
            if (packet.data.includes('debugPort')) {
            // This means we can parse packet.data as JSON.
            const parsed = JSON.parse(packet.data);

            showMessage(`Check the local Node Inspector instance running on port ${parsed.debugPort}`);

            // debugPort has the port we need to send to /inspect.
            // showMessage(`debugPort: ${parsed.debugPort}`);
            // showMessage('Sending a request to /inspect');
            // POST `packet.data` to /inspect.
            // ZZZ
            // const res = await (await postJSON('/inspect', packet.data)).arrayBuffer();
            // showMessage(bufferToString(res));
            }

        };

        // Log in console when the socket is closed.
        socket.onclose = event => console.log(`Closed ${event.code}`);
        // ----- End of Socket Events -----

        return socket;
    }

    function sendMessage(socket, message) {
        socket.send(message);
    }

    function hexStringToArrayBuffer(hexString) {
    
        // ensure even number of characters
        if (hexString.length % 2 != 0) {
            console.log('WARNING: expecting an even number of characters in the hexString');
        }
        
        // check for some non-hex characters
        var bad = hexString.match(/[G-Z\s]/i);
        if (bad) {
            console.log('WARNING: found non-hex characters', bad);
        }
        
        // split the string into pairs of octets
        var pairs = hexString.match(/[\dA-F]{2}/gi);
        
        // convert the octets to integers
        var integers = pairs.map(function(s) {
            return parseInt(s, 16);
        });
        
        var array = new Uint8Array(integers);
        
        return array.buffer;
    }

    function parsePacket(packet) {
        // Reference: https://stackoverflow.com/a/47564755
        // We're gonna get ArrayBuffers from the websocket.
        // Create a view.
        var view = new DataView(packet);

        // The first byte is the type.
        var typeByte = view.getInt8(0);
        var type = '';
        // Create the type of the packet.
        switch (typeByte) {
            case 0x04:
            type = 'OK Message';
            break;
            // case 0x02:
            //   type = ''
                
            default:
            // Otherwise use the hex string.
            type = typeByte.toString(16);
            break;
        }

        // Next 12 bytes are length of the rest of the packet that we can skip.

        // Everything after is value.
        return {
            type: type,
            data: bufferToString(packet.slice(13, packet.byteLength))
        };
    }

    function showMessage(message) {
        let messageElem = document.createElement('div');
        messageElem.textContent = message;
        document.getElementById('messages').appendChild(messageElem);
    }

    function doSigning(data) {

        // req.body is already parsed because we have the content-type.
        var signed = ''; //signer.sign(String(data));

        // Packet data.
        let packetData = `{"type":"connectionType","commit":"${els.commit}","signedData":"${signed}","desiredConnectionType":2,"args":{"language":"en","break":false,"port":55000}}`;
        console.log(packetData);

        buf = createPacket(0x02, 0x00, 0x00, packetData);
        return buf;
    }

    function disconnect() {
      if (socket) {
        log("Closing connection...");
        socket.close();
      }
    }
  </script>
</body>
</html>
